@PART[nfa-multimodal-25-1]:FINAL
{
	@MODULE[ModuleEngines*],0
	{
		%engageEffectName = engageDry
		%disengageEffectName = disengageDry
	}
	@MODULE[ModuleEngines*],1
	{
		%runningEffectName = running_closed
		%spoolEffectName = power_closed
		%engageEffectName = engageRocket
		%disengageEffectName = disengageRocket
	}
}

@PART[nfa-multimodal-25-1]:NEEDS[!RealPlume,!StockWaterfallEffects]:FINAL
{
	@EFFECTS
	{
		%running_closed
		{
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = NearFutureAeronautics/Sounds/broadswordrocket_loop
				volume = 0.0 0.0
				volume = 0.7 1.0
				pitch = 0.0 0.2
				pitch = 1.0 1.0
				loop = true
			}
		}
		%power_closed
		{
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/RAPIER_Rocket_High
				volume = 0.0 0.0
				volume = 0.05 0.0
				volume = 1.0 1.0
				pitch = 0.0 0.2
				pitch = 1.0 1.0
				loop = true
			}
		}
		%power_open
		{
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/RR_Olympus_Running_High
				volume = 0.0 0.0
				volume = 0.5 0.4
				volume = 1.0 0.5
				pitch = 0.0 0.8
				pitch = 1.0 1.5
				loop = true
			}
		}
		%running_open
		{
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/RR_Olympus_Running_Low
				volume = 0.0 0.0
				volume = 0.02 0.0
				volume = 0.1 0.8
				volume = 0.2 1.0
				volume = 0.5 1.0
				pitch = 0.0 0.5
				pitch = 0.2 1.0
				pitch = 1.0 1.2
				loop = true
			}
		}
		%engageDry
		{
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/RR_Olympus_Startup
				volume = 1.0
				pitch = 2.0
				loop = false
			}
		}
		%disengageDry
		{
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/RR_Olympus_Shutdown
				volume = 1.0
				pitch = 2.0
				loop = false
			}
		}
		%engageRocket
		{
			AUDIO
			{
				channel = Ship
				clip = sound_vent_soft
				volume = 1.0
				pitch = 1.0
				loop = false
			}
		}
		%disengageRocket
		{
			AUDIO
			{
				channel = Ship
				clip = sound_vent_soft
				volume = 1.0
				pitch = 1.0
				loop = false
			}
		}
	}
}

