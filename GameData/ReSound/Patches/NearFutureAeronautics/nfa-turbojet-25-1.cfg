			scale = 1
			minimum = 0
			speed = 4
			seed = 23
		}
		CONTROLLER
		{
			name = R4
			linkedTo = random
			noiseType = perlin
			scale = 1
			minimum = 0
			speed = 4
			seed = 37
		}
		TEMPLATE
		{
			templateName = stock-kerozine-afterburner-2
			overrideParentTransform = ThrustTransform
			position = 0, 0, 0
			rotation = 0, 0, 0
			scale = 1.8, 1.8, 1.8
		}
	}
