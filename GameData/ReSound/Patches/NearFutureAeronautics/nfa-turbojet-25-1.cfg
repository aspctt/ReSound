// --- Mod config & StockWaterfallEffects compatibility by aspctt

@PART[nfa-turbojet-25-1]:FINAL
{
	@MODULE[ModuleEngines*]
	{
		%powerEffectName = running_thrust
		%spoolEffectName = running_turbine
		%engageEffectName = engage
		%disengageEffectName = disengage
		%flameoutEffectName = flameout
	}
}

@PART[nfa-turbojet-25-1]:NEEDS[!RealPlume,!StockWaterfallEffects]:FINAL
{
	@EFFECTS
	{		
		%running_thrust
		{			
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/GE404_Afterburner_High
				volume = 0.0 0.0
				volume = 0.1 0.3
				volume = 1.0 0.5
				pitch = 0.0 0.5
				pitch = 0.33 0.8
				pitch = 1.0 1.5
				loop = true
			}				
		}
		%running_turbine
		{
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/GE404_Afterburner_Low
				volume = 0.0 0.0
				volume = 0.05 0.9
				volume = 1.0 1.0
				pitch = 0.0 0.5
				pitch = 0.05 0.6
				pitch = 0.33 1.0
				pitch = 1.0 1.2
				loop = true
			}
		}
		%engage
		{
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/GE404_Startup
				volume = 1.0
				pitch = 2.0
				loop = false
			}
		}
		%disengage
		{
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/GE404_Shutdown
				volume = 1.0
				pitch = 2.0
				loop = false
			}
		}
		%flameout
		{
			!AUDIO {}
			AUDIO
			{
				channel = Ship
				clip = sound_explosion_low
				volume = 1.0
				pitch = 2.0
				loop = false
			}
		}
	}
}

