// --- ReSound
// --- Legacy config by JeanTheDragon and legacy RealPlume compatibility by theonegalen
// --- Mod config & StockWaterfallEffects compatibility by aspctt

@PART[nfa-atomic-jet-25-1]:NEEDS[!RealPlume]:FINAL
{
	@EFFECTS
	{
		%power_open
		{			
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/RR_Olympus_Running_High
				volume = 0.0 0.0
				volume = 0.5 0.4
				volume = 1.0 0.5
				pitch = 0.0 0.8
				pitch = 1.0 1.5
				loop = true
			}				
		}
		%running_open
		{
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/RR_Olympus_Running_Low
				volume = 0.0 0.0
				volume = 0.02 0.0
				volume = 0.1 0.8
				volume = 0.2 1.0
				volume = 0.5 1.0
				pitch = 0.0 0.5
				pitch = 0.2 1.0
				pitch = 1.0 1.2
				loop = true
			}
		}
	}
}

@PART[nfa-atomic-jet-25-1]:NEEDS[zzRealPlume]:FINAL
{
	%EFFECTS
	{
		%Turbojet-Spool
		{
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/RR_Olympus_Running_Low
				volume = 0.0 0.0
				volume = 0.02 0.0
				volume = 0.1 0.8
				volume = 0.2 1.0
				volume = 0.5 1.0
				pitch = 0.0 0.5
				pitch = 0.2 1.0
				pitch = 1.0 1.2
				loop = true
			}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/RR_Olympus_Running_High
				volume = 0.0 0.0
				volume = 0.5 0.4
				volume = 1.0 0.5
				pitch = 0.0 0.8
				pitch = 1.0 1.5
				loop = true
			}
		}
	}
}
