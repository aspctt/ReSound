@PART[nfa-multimodal-125-1]:NEEDS[zzRealPlume,!StockWaterfallEffects]:FINAL
{
	%EFFECTS
	{
		%Turbojet-Spool
		{
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/RAPIER_Fan_Low
				volume = 0.0 0.0
				volume = 0.02 0.0
				volume = 0.1 0.8
				volume = 0.2 1.0
				volume = 0.5 1.0
				pitch = 0.0 0.5
				pitch = 0.2 1.0
				pitch = 1.0 1.2
				loop = true
			}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/RAPIER_Fan_High
			//	clip = sound_rocket_spurts
				volume = 0.0 0.0
				volume = 0.5 0.4
				volume = 1.0 0.5
				pitch = 0.0 0.8
				pitch = 1.0 1.5
				loop = true
			}
		}
		%engageDry
		{
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/RAPIER_Startup
				volume = 0.5
				pitch = 1.0
				loop = false
			}
		}
		%disengageDry
		{
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/RAPIER_Shutdown
				volume = 0.5
				pitch = 1.0
				loop = false
			}
		}
		%engageRocket
		{
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = RealPlume/KW_Sounds/sound_liq1
				volume = #$../../../PLUME[Hydrolox_LowerBlaze]/plumeScale$
				@volume *= 4
				pitch = 2.0
				loop = false
			}
		}
		%disengageRocket
		{
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = sound_vent_soft
				volume = 1.0
				pitch = 2.0
				loop = false
			}
		}
		%Hydrolox_LowerBlaze
		{
			AUDIO
			{
				channel = Ship
				clip = RealPlume/KW_Sounds/sound_altloop2
				volume = 0.0 0.0
				volume = #$../../../PLUME[Hydrolox_LowerBlaze]/plumeScale$
				@volume,1 *= 4
				@volume,1 ^= :^:1.0 :
				pitch = 0.0 1.0
				pitch = 1.0 1.0
				loop = true
			}			
		}
		%power_closed
		{
			!AUDIO,* {}
			AUDIO
			{
				channel = Ship
				clip = ReSound/Sounds/RAPIER_Rocket_High
				volume = 0.0 0.0
				volume = 0.05 0.0
				volume = 1.0 1.0
				pitch = 0.0 0.2
				pitch = 1.0 1.0
				loop = true
			}
		}
	}
}
